naftiko: 1.0.0-alpha2
info:
  label: Drift — Teams
  description: 'Drift — Teams. 2 operations. Lead operation: Drift List teams. Self-contained Naftiko capability covering
    one Drift business surface.'
  tags:
  - Drift
  - Teams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DRIFT_API_KEY: DRIFT_API_KEY
capability:
  consumes:
  - type: http
    namespace: drift-teams
    baseUri: http://{{base_url}}
    description: Drift — Teams business capability. Self-contained, no shared references.
    resources:
    - name: teams-org
      path: /teams/org
      operations:
      - name: get
        method: GET
        description: Drift List teams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: teams-users-id
      path: /teams/users/{id}
      operations:
      - name: get
        method: GET
        description: Drift List teams by user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Drift userId
          required: true
    authentication:
      type: bearer
      token: '{{env.DRIFT_API_KEY}}'
  exposes:
  - type: rest
    namespace: drift-teams-rest
    port: 8080
    description: REST adapter for Drift — Teams. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/teams/org
      name: teams-org
      description: REST surface for teams-org.
      operations:
      - method: GET
        name: get
        description: Drift List teams
        call: drift-teams.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/teams/users/{id}
      name: teams-users-id
      description: REST surface for teams-users-id.
      operations:
      - method: GET
        name: get
        description: Drift List teams by user
        call: drift-teams.get
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: drift-teams-mcp
    port: 9090
    transport: http
    description: MCP adapter for Drift — Teams. One tool per consumed operation, routed inline through this capability's consumes
      block.
    tools:
    - name: drift-list-teams
      description: Drift List teams
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: drift-teams.get
      outputParameters:
      - type: object
        mapping: $.
    - name: drift-list-teams-user
      description: Drift List teams by user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: drift-teams.get
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
