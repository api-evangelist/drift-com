naftiko: 1.0.0-alpha2
info:
  label: Drift — Accounts
  description: 'Drift — Accounts. 5 operations. Lead operation: Drift List accounts. Self-contained Naftiko capability covering
    one Drift business surface.'
  tags:
  - Drift
  - Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DRIFT_API_KEY: DRIFT_API_KEY
capability:
  consumes:
  - type: http
    namespace: drift-accounts
    baseUri: http://{{base_url}}
    description: Drift — Accounts business capability. Self-contained, no shared references.
    resources:
    - name: accounts
      path: /accounts
      operations:
      - name: get
        method: GET
        description: Drift List accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: index
          in: query
          type: string
          description: Used as a starting index of the the accounts query in the authenticated Drift user's account
        - name: size
          in: query
          type: string
          description: Number of accounts per batch (default=10, max=65)
    - name: accounts-create
      path: /accounts/create
      operations:
      - name: post
        method: POST
        description: Drift Create an account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: accounts-update
      path: /accounts/update
      operations:
      - name: patch
        method: PATCH
        description: Drift Update an account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: accounts-id
      path: /accounts/{id}
      operations:
      - name: get
        method: GET
        description: Drift Fetch an account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Drift accountId
          required: true
      - name: delete
        method: DELETE
        description: Drift Delete an account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Drift accountId
          required: true
    authentication:
      type: bearer
      token: '{{env.DRIFT_API_KEY}}'
  exposes:
  - type: rest
    namespace: drift-accounts-rest
    port: 8080
    description: REST adapter for Drift — Accounts. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/accounts
      name: accounts
      description: REST surface for accounts.
      operations:
      - method: GET
        name: get
        description: Drift List accounts
        call: drift-accounts.get
        with:
          index: rest.index
          size: rest.size
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/create
      name: accounts-create
      description: REST surface for accounts-create.
      operations:
      - method: POST
        name: post
        description: Drift Create an account
        call: drift-accounts.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/update
      name: accounts-update
      description: REST surface for accounts-update.
      operations:
      - method: PATCH
        name: patch
        description: Drift Update an account
        call: drift-accounts.patch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{id}
      name: accounts-id
      description: REST surface for accounts-id.
      operations:
      - method: GET
        name: get
        description: Drift Fetch an account
        call: drift-accounts.get
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: Drift Delete an account
        call: drift-accounts.delete
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: drift-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Drift — Accounts. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: drift-list-accounts
      description: Drift List accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: drift-accounts.get
      with:
        index: tools.index
        size: tools.size
      outputParameters:
      - type: object
        mapping: $.
    - name: drift-create-account
      description: Drift Create an account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: drift-accounts.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: drift-update-account
      description: Drift Update an account
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: drift-accounts.patch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: drift-fetch-account
      description: Drift Fetch an account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: drift-accounts.get
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: drift-delete-account
      description: Drift Delete an account
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: drift-accounts.delete
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
