naftiko: 1.0.0-alpha2
info:
  label: Drift — App Admin
  description: 'Drift — App Admin. 2 operations. Lead operation: Drift Get token information. Self-contained Naftiko capability
    covering one Drift business surface.'
  tags:
  - Drift
  - App Admin
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DRIFT_API_KEY: DRIFT_API_KEY
capability:
  consumes:
  - type: http
    namespace: drift-app-admin
    baseUri: http://{{base_url}}
    description: Drift — App Admin business capability. Self-contained, no shared references.
    resources:
    - name: app-token_info
      path: /app/token_info
      operations:
      - name: post
        method: POST
        description: Drift Get token information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: app-uninstall
      path: /app/uninstall
      operations:
      - name: post
        method: POST
        description: Drift Trigger app uninstall
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: clientId
          in: query
          type: string
        - name: clientSecret
          in: query
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.DRIFT_API_KEY}}'
  exposes:
  - type: rest
    namespace: drift-app-admin-rest
    port: 8080
    description: REST adapter for Drift — App Admin. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/app/token-info
      name: app-token-info
      description: REST surface for app-token_info.
      operations:
      - method: POST
        name: post
        description: Drift Get token information
        call: drift-app-admin.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/app/uninstall
      name: app-uninstall
      description: REST surface for app-uninstall.
      operations:
      - method: POST
        name: post
        description: Drift Trigger app uninstall
        call: drift-app-admin.post
        with:
          clientId: rest.clientId
          clientSecret: rest.clientSecret
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: drift-app-admin-mcp
    port: 9090
    transport: http
    description: MCP adapter for Drift — App Admin. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: drift-get-token-information
      description: Drift Get token information
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: drift-app-admin.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: drift-trigger-app-uninstall
      description: Drift Trigger app uninstall
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: drift-app-admin.post
      with:
        clientId: tools.clientId
        clientSecret: tools.clientSecret
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
