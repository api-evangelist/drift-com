naftiko: 1.0.0-alpha2
info:
  label: Drift — SCIM API
  description: 'Drift — SCIM API. 5 operations. Lead operation: Drift List user objects. Self-contained Naftiko capability
    covering one Drift business surface.'
  tags:
  - Drift
  - SCIM API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DRIFT_API_KEY: DRIFT_API_KEY
capability:
  consumes:
  - type: http
    namespace: drift-scim-api
    baseUri: http://{{base_url}}
    description: Drift — SCIM API business capability. Self-contained, no shared references.
    resources:
    - name: scim-Users
      path: /scim/Users
      operations:
      - name: get
        method: GET
        description: Drift List user objects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Drift Provision a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: put
        method: PUT
        description: Drift Update a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: delete
        method: DELETE
        description: Drift Deprovision a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: scim-Users-id
      path: /scim/Users/{id}
      operations:
      - name: get
        method: GET
        description: Drift Fetch a user object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Drift userId
          required: true
    authentication:
      type: bearer
      token: '{{env.DRIFT_API_KEY}}'
  exposes:
  - type: rest
    namespace: drift-scim-api-rest
    port: 8080
    description: REST adapter for Drift — SCIM API. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/scim/users
      name: scim-users
      description: REST surface for scim-Users.
      operations:
      - method: GET
        name: get
        description: Drift List user objects
        call: drift-scim-api.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Drift Provision a user
        call: drift-scim-api.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: put
        description: Drift Update a user
        call: drift-scim-api.put
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: Drift Deprovision a user
        call: drift-scim-api.delete
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/scim/users/{id}
      name: scim-users-id
      description: REST surface for scim-Users-id.
      operations:
      - method: GET
        name: get
        description: Drift Fetch a user object
        call: drift-scim-api.get
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: drift-scim-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for Drift — SCIM API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: drift-list-user-objects
      description: Drift List user objects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: drift-scim-api.get
      outputParameters:
      - type: object
        mapping: $.
    - name: drift-provision-user
      description: Drift Provision a user
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: drift-scim-api.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: drift-update-user
      description: Drift Update a user
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: drift-scim-api.put
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: drift-deprovision-user
      description: Drift Deprovision a user
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: drift-scim-api.delete
      outputParameters:
      - type: object
        mapping: $.
    - name: drift-fetch-user-object
      description: Drift Fetch a user object
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: drift-scim-api.get
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
