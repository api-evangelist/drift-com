aid: drift-com
url: https://raw.githubusercontent.com/api-evangelist/drift-com/refs/heads/main/apis.yml
name: Drift
kind: company
description: >-
  Drift is a conversational marketing and sales platform delivering AI-powered chatbots, live chat, video messaging,
  account-based engagement, and Fastlane playbook automation on B2B websites. Drift was acquired by Salesloft in 2024
  and now operates as the AI conversation surface within the Salesloft Revenue Orchestration Platform; the drift.com
  domain redirects to salesloft.com/platform/drift while devdocs.drift.com continues to host the developer API
  documentation.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Conversational Marketing
  - Chatbots
  - Sales
  - Messaging
  - Customer Engagement
  - Revenue Orchestration
  - AI Chat
created: '2026-05-25'
modified: '2026-05-25'
specificationVersion: '0.19'
apis:
  - aid: drift-com:drift-rest-api
    name: Drift REST API
    description: >-
      Drift REST API covers contacts, users, conversations and messages, accounts, playbooks, teams, app admin tokens,
      data privacy (GDPR retrieval and deletion), and SCIM provisioning. Webhook events deliver realtime conversation,
      contact, and message updates. Authentication uses OAuth, App Admin Tokens, and signed identities as documented at
      devdocs.drift.com.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://devdocs.drift.com/
    baseURL: https://driftapi.com
    tags:
      - Messaging
      - Chatbots
      - REST
      - Conversations
      - SCIM
    properties:
      - type: Documentation
        url: https://devdocs.drift.com/
      - type: APIReference
        url: https://devdocs.drift.com/reference
      - type: Authentication
        url: https://devdocs.drift.com/docs/authentication
      - type: OpenAPI
        url: openapi/drift-com-openapi.yml
